<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hang in There | 模块页</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="./site-data.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <div class="brand-badge">H</div>
        <div class="brand-text">
          <h1>Hang in There</h1>
          <p id="breadcrumb">模块加载中…</p>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <a class="back-link" href="./index.html">← 返回首页</a>

    <section class="panel">
      <div class="module-top">
        <h2 id="moduleTitle"></h2>
        <p id="moduleDesc"></p>
      </div>

      <div class="chip-row" id="typeChips"></div>
      <div id="moduleContent"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const categoryId = params.get('category');
    const typeId = params.get('type');

    const category = siteData.categories.find(item => item.id === categoryId) || siteData.categories[0];
    const selectedType = category.types.find(item => item.id === typeId) || category.types[0];

    const breadcrumb = document.getElementById('breadcrumb');
    const moduleTitle = document.getElementById('moduleTitle');
    const moduleDesc = document.getElementById('moduleDesc');
    const typeChips = document.getElementById('typeChips');
    const moduleContent = document.getElementById('moduleContent');

    breadcrumb.textContent = `${category.name} / ${selectedType.name}`;
    moduleTitle.textContent = selectedType.name;
    moduleDesc.textContent = selectedType.description;

    typeChips.innerHTML = category.types.map(type => {
      const active = type.id === selectedType.id ? 'active' : '';
      return `<a class="chip ${active}" href="./module.html?category=${encodeURIComponent(category.id)}&type=${encodeURIComponent(type.id)}">${type.name}</a>`;
    }).join('');

    function renderEmpty(type) {
      moduleContent.innerHTML = `
        <div class="notice">
          这个题型入口已经预留好了，目前内容先留空。后续你只需要把题目数据补进来，就可以继续扩展，不用再改网站整体结构。
        </div>
      `;
    }

    function renderExternal(type) {
      moduleContent.innerHTML = `
        <div class="notice">
          <div>这个题型会跳转到你原来已经在用的 Complete the Words 刷题页。</div>
          <div style="margin-top:8px;">${type.note || ''}</div>
          <a class="button" href="${type.externalHref}">进入 ${type.name}</a>
        </div>
      `;
    }

    function renderSpeakingList(items) {
      moduleContent.innerHTML = items.map(item => `
        <article class="question-card">
          <div class="question-number">Listen and Repeat ${item.number}</div>
          <h3 class="question-title">${item.title}</h3>

          <div class="block-title">题目内容</div>
          <ol class="lines">
            ${item.lines.map(line => `<li>${line}</li>`).join('')}
          </ol>

          <div class="block-title">场景知识补充</div>
          <div class="vocab-list">
            ${item.vocab.map(([term, ipa, meaning]) => `
              <div class="vocab-item"><strong>${term}</strong> ${ipa}<br>${meaning}</div>
            `).join('')}
          </div>
        </article>
      `).join('');
    }

    if (selectedType.status === 'content' && category.id === 'speaking' && selectedType.id === 'listen-and-repeat') {
      renderSpeakingList(siteData.speaking['listen-and-repeat']);
    } else if (selectedType.status === 'external') {
      renderExternal(selectedType);
    } else {
      renderEmpty(selectedType);
    }
  </script>
</body>
</html>
