<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaking Practice</title>
  <link rel="stylesheet" href="./styles.css?v=20260321d" />
</head>
<body>
  <div class="page-shell">
    <a class="top-link" href="index.html">← Back to home</a>

    <header class="page-title">
      <h1>Speaking · Listen and Repeat</h1>
      <p class="page-subtitle">
        Open a scene, tap the speaker to hear one sentence, then record your own repetition.
      </p>
    </header>

    <section class="card toolbar">
      <label>
        <span class="helper">Playback speed</span><br>
        <select id="speedSelect" class="select">
          <option value="1">1.0×</option>
          <option value="0.75">0.75×</option>
          <option value="0.5">0.5×</option>
        </select>
      </label>
      <div class="notice">
        Tip: 0.5× is helpful for shadowing practice. After listening, tap Record and repeat the sentence yourself.
      </div>
    </section>

    <div id="speaking-root"></div>
  </div>

  <script src="./site-data.js?v=20260321d"></script>
  <script>
    const root = document.getElementById("speaking-root");
    let currentAudio = null;
    let currentStopTimer = null;
    let mediaRecorder = null;
    let currentStream = null;
    let activeChunks = [];
    let activeSentenceId = null;
    let recordingState = {};

    function stopCurrentAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      if (currentStopTimer) {
        clearInterval(currentStopTimer);
        currentStopTimer = null;
      }
    }

    function playSegment(scene, index) {
      stopCurrentAudio();

      const audio = new Audio(`audio/speaking/${scene.audio}`);
      const speed = parseFloat(document.getElementById("speedSelect").value || "1");
      const [start, end] = scene.timestamps[index];

      currentAudio = audio;
      audio.playbackRate = speed;
      audio.currentTime = start;

      audio.addEventListener("loadedmetadata", () => {
        audio.currentTime = start;
        audio.play().catch(err => console.error(err));
      });

      audio.play().catch(() => {
        // fallback for browsers that need loadedmetadata first
      });

      currentStopTimer = setInterval(() => {
        if (!currentAudio) return;
        if (currentAudio.currentTime >= end) {
          stopCurrentAudio();
        }
      }, 60);
    }

    function stopActiveRecorder() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }
      mediaRecorder = null;
      activeChunks = [];
      activeSentenceId = null;
    }

    async function toggleRecord(sentenceId) {
      const recordBtn = document.getElementById(`record-btn-${sentenceId}`);
      const playMineBtn = document.getElementById(`play-mine-btn-${sentenceId}`);
      const status = document.getElementById(`record-status-${sentenceId}`);
      const audioEl = document.getElementById(`my-audio-${sentenceId}`);

      if (mediaRecorder && mediaRecorder.state === "recording" && activeSentenceId === sentenceId) {
        mediaRecorder.stop();
        return;
      }

      if (mediaRecorder && mediaRecorder.state === "recording" && activeSentenceId !== sentenceId) {
        mediaRecorder.stop();
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        currentStream = stream;
        activeChunks = [];
        activeSentenceId = sentenceId;

        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            activeChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          const blob = new Blob(activeChunks, { type: mediaRecorder.mimeType || "audio/webm" });
          const url = URL.createObjectURL(blob);
          audioEl.src = url;
          audioEl.style.display = "none";
          playMineBtn.disabled = false;
          playMineBtn.dataset.url = url;
          recordBtn.textContent = "⏺ Record";
          status.textContent = "Recorded. Tap Play mine to listen.";
          status.classList.remove("recording-now");
          recordingState[sentenceId] = url;

          if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
          }
          mediaRecorder = null;
          activeChunks = [];
          activeSentenceId = null;
        };

        mediaRecorder.start();
        recordBtn.textContent = "⏹ Stop";
        status.textContent = "Recording...";
        status.classList.add("recording-now");
      } catch (error) {
        console.error(error);
        status.textContent = "Microphone access was blocked or not available.";
      }
    }

    function playMine(sentenceId) {
      const audioEl = document.getElementById(`my-audio-${sentenceId}`);
      if (audioEl && audioEl.src) {
        audioEl.currentTime = 0;
        audioEl.play().catch(err => console.error(err));
      }
    }

    const speakingType = siteData.speaking.types.find(t => t.id === "lr");
    const set = speakingType.sets[0];

    const setHeader = document.createElement("div");
    setHeader.className = "set-header";
    setHeader.innerHTML = `
      <div>
        <h2>${set.title}</h2>
        <p class="helper">Tap one scene at a time. Each sentence has listening and recording controls.</p>
      </div>
    `;
    root.appendChild(setHeader);

    set.scenes.forEach((scene) => {
      const card = document.createElement("section");
      card.className = "card scene-card";

      const header = document.createElement("button");
      header.type = "button";
      header.className = "scene-header";
      header.innerHTML = `
        <span class="scene-name">${scene.title}</span>
        <span class="scene-arrow">▶</span>
      `;

      const content = document.createElement("div");
      content.className = "scene-content";

      const lineList = document.createElement("div");
      lineList.className = "line-list";

      scene.lines.forEach((line, i) => {
        const sentenceId = `${scene.title.toLowerCase().replace(/\s+/g, "-")}-${i + 1}`;
        const item = document.createElement("div");
        item.className = "line-item";

        const controls = document.createElement("div");
        controls.className = "sentence-controls";
        controls.innerHTML = `
          <button class="play-btn" type="button" aria-label="Play sentence">🔊</button>
          <button class="record-btn" id="record-btn-${sentenceId}" type="button">⏺ Record</button>
          <button class="mine-btn" id="play-mine-btn-${sentenceId}" type="button" disabled>▶ Play mine</button>
        `;

        controls.querySelector(".play-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          playSegment(scene, i);
        });

        controls.querySelector(".record-btn").addEventListener("click", async (e) => {
          e.stopPropagation();
          await toggleRecord(sentenceId);
        });

        controls.querySelector(".mine-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          playMine(sentenceId);
        });

        const textWrap = document.createElement("div");
        textWrap.className = "sentence-wrap";
        textWrap.innerHTML = `
          <div class="line-text">${line}</div>
          <div class="record-status" id="record-status-${sentenceId}">Tap Record to practice this sentence.</div>
          <audio id="my-audio-${sentenceId}" preload="metadata"></audio>
        `;

        item.appendChild(controls);
        item.appendChild(textWrap);
        lineList.appendChild(item);
      });

      const vocabTitle = document.createElement("h3");
      vocabTitle.className = "block-title";
      vocabTitle.textContent = "Vocabulary";

      const vocabGrid = document.createElement("div");
      vocabGrid.className = "vocab-grid";
      scene.vocab.forEach((v) => {
        const vocabItem = document.createElement("div");
        vocabItem.className = "vocab-item";
        vocabItem.textContent = v;
        vocabGrid.appendChild(vocabItem);
      });

      content.appendChild(lineList);
      content.appendChild(vocabTitle);
      content.appendChild(vocabGrid);

      header.addEventListener("click", () => {
        const isOpen = content.classList.contains("open");
        document.querySelectorAll(".scene-content").forEach(el => el.classList.remove("open"));
        document.querySelectorAll(".scene-arrow").forEach(el => el.textContent = "▶");

        if (!isOpen) {
          content.classList.add("open");
          header.querySelector(".scene-arrow").textContent = "▼";
        }
      });

      card.appendChild(header);
      card.appendChild(content);
      root.appendChild(card);
    });
  </script>
</body>
</html>
