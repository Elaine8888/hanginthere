<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read an Academic Passage</title>
  <style>
    :root { --primary:#4a90e2; --success:#28a745; --error:#dc3545; --bg:#f4f7f9; }
    * { box-sizing:border-box; }
    body { font-family:'Segoe UI', system-ui, sans-serif; background:var(--bg); margin:0; padding:20px; color:#333; }
    .container { max-width:1280px; margin:0 auto; background:white; padding:30px; border-radius:18px; box-shadow:0 4px 15px rgba(0,0,0,0.08); position:relative; }
    #timer { position:absolute; top:20px; right:30px; font-weight:bold; color:var(--primary); background:#eef5ff; padding:5px 12px; border-radius:15px; font-variant-numeric:tabular-nums; border:1px solid #d0e3ff; }
    .btn-back, button { border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; transition:opacity 0.2s; text-decoration:none; display:inline-block; }
    .btn-back, .btn-retry { background:#6c757d; color:white; }
    .btn-main { background:var(--primary); color:white; }
    .btn-next { background:var(--success); color:white; }
    .topbar { margin-bottom:20px; }
    h1 { margin:0 120px 8px 0; color:#111827; font-size:2.05rem; text-align:center; }
    .sub { color:#6b7280; margin-bottom:10px; text-align:center; }
    .mini-title { color:#4a90e2; font-weight:700; margin-bottom:12px; text-align:center; }
    .layout { display:grid; grid-template-columns: 1.05fr .95fr; gap:38px; align-items:start; }
    .passage { font-size:1rem; line-height:1.58; text-align:left; color:#333; }
    .passage p { margin:0 0 20px; }
    .highlight-word { background:#14b8a6; color:#fff; padding:1px 4px; border-radius:2px; font-weight:700; }
    .question-panel { padding-top:6px; }
    .question-block { margin-bottom:26px; }
    .question-text { font-size:1rem; line-height:1.45; font-weight:700; color:#222; margin-bottom:14px; }
    .options { display:flex; flex-direction:column; gap:14px; }
    .option { display:flex; align-items:flex-start; gap:14px; cursor:pointer; }
    .option input[type="radio"] { width:18px; height:18px; margin-top:3px; accent-color:#4a90e2; }
    .option-text { font-size:0.98rem; line-height:1.45; }
    .option.correct .option-text { color:var(--success); font-weight:700; }
    .option.wrong .option-text { color:var(--error); font-weight:700; }
    .option.dim .option-text { color:#666; }
    .answer-area { margin-top:28px; padding:20px; background:#f8f9fa; border-radius:10px; border-left:5px solid var(--primary); }
    .answer-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:10px; margin-top:10px; }
    .ans-item { font-size:1rem; color:#555; border-bottom:1px dashed #ddd; padding-bottom:5px; }
    .nav-tools { margin-top:28px; padding-top:20px; border-top:1px solid #eee; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .hidden { display:none; }
    @media (max-width: 960px) {
      .container { padding:20px; }
      #timer { position:static; display:inline-block; margin-bottom:12px; }
      h1 { margin-right:0; font-size:1.5rem; text-align:left; }
      .sub, .mini-title { text-align:left; }
      .layout { grid-template-columns:1fr; gap:22px; }
      .passage { font-size:1rem; line-height:1.72; }
      .question-panel { padding-top:0; }
    }
  </style>
</head>
<body>
<div class="container">
  <div id="timer">⏱ 00:00</div>
  <div class="topbar">
    <a class="btn-back" href="index.html">← 返回目录</a>
  </div>
  <h1 id="quiz-title"></h1>
  <div id="quiz-subtitle" class="mini-title"></div>
  <div id="quiz-date" class="sub"></div>

  <div class="layout">
    <div class="passage" id="quiz-content"></div>
    <div class="question-panel" id="question-panel"></div>
  </div>

  <div class="nav-tools">
    <div id="score-result" style="font-size:1.35rem; font-weight:bold; color:var(--primary);"></div>
    <div>
      <button id="retry-btn" class="btn-retry">再做一次</button>
      <button id="submit-btn" class="btn-main">提交核对</button>
      <button id="next-btn" class="btn-next hidden">下一题 →</button>
    </div>
  </div>

  <div id="answer-review" class="answer-area hidden">
    <strong>正确答案回顾：</strong>
    <div class="answer-grid" id="answer-grid"></div>
  </div>
</div>

<script src="data/questions.js"></script>
<script>
  const STORAGE_KEY = 'rap_scores_v1';
  const questionList = window.questions || [];
  const scores = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const params = new URLSearchParams(location.search);
  const currentId = Number(params.get('id') || 1);
  const currentIdx = questionList.findIndex(q => q.id === currentId);
  const d = questionList[currentIdx];

  let timer = null;
  let startTime = Date.now();

  const titleEl = document.getElementById('quiz-title');
  const subtitleEl = document.getElementById('quiz-subtitle');
  const dateEl = document.getElementById('quiz-date');
  const contentEl = document.getElementById('quiz-content');
  const panelEl = document.getElementById('question-panel');
  const scoreEl = document.getElementById('score-result');
  const reviewEl = document.getElementById('answer-review');
  const gridEl = document.getElementById('answer-grid');
  const submitBtn = document.getElementById('submit-btn');
  const nextBtn = document.getElementById('next-btn');
  const retryBtn = document.getElementById('retry-btn');

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderQuestions() {
    if (!d || !Array.isArray(d.questions)) {
      panelEl.innerHTML = '';
      return;
    }
    panelEl.innerHTML = d.questions.map((q, qi) => `
      <div class="question-block" data-question-idx="${qi}">
        <div class="question-text">${escapeHtml(q.question)}</div>
        <div class="options">
          ${q.options.map((opt, oi) => `
            <label class="option" data-q="${qi}" data-opt="${oi}">
              <input type="radio" name="question-${qi}" value="${oi}">
              <span class="option-text">${escapeHtml(opt)}</span>
            </label>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  if (!d) {
    titleEl.textContent = '题目未找到';
    contentEl.textContent = '请返回首页重新选择题目。';
    submitBtn.disabled = true;
    nextBtn.classList.add('hidden');
    retryBtn.disabled = true;
  } else {
    titleEl.textContent = d.title || '';
    subtitleEl.textContent = d.subtitle || '';
    dateEl.textContent = d.date || '';
    contentEl.innerHTML = (d.passage || '').split('\n\n').map(p => `<p>${p}</p>`).join('');
    renderQuestions();
    startTime = Date.now();
    timer = setInterval(updateTimer, 1000);
    if (currentIdx >= 0 && currentIdx < questionList.length - 1) {
      nextBtn.onclick = () => {
        const nextId = questionList[currentIdx + 1].id;
        location.href = `practice.html?id=${nextId}`;
      };
    } else {
      nextBtn.classList.add('hidden');
    }
  }

  function updateTimer() {
    const s = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timer').innerText = `⏱ ${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
  }

  function checkScore() {
    if (!d) return;
    clearInterval(timer);
    let correct = 0;
    gridEl.innerHTML = '';

    (d.questions || []).forEach((q, qi) => {
      const checked = document.querySelector(`input[name="question-${qi}"]:checked`);
      const userAnswer = checked ? Number(checked.value) : null;
      const block = document.querySelector(`.question-block[data-question-idx="${qi}"]`);
      const labels = block ? Array.from(block.querySelectorAll('.option')) : [];
      const isCorrect = userAnswer === q.answer;
      if (isCorrect) correct++;

      labels.forEach((label, oi) => {
        const input = label.querySelector('input');
        if (input) input.disabled = true;
        label.classList.remove('correct', 'wrong', 'dim');
        if (oi === q.answer) {
          label.classList.add('correct');
        } else if (userAnswer === oi && userAnswer !== q.answer) {
          label.classList.add('wrong');
        } else if (userAnswer !== null) {
          label.classList.add('dim');
        }
      });

      const answerLetter = ['A', 'B', 'C', 'D'][q.answer] || '';
      gridEl.innerHTML += `<div class="ans-item">${qi + 1}. <strong>${answerLetter}</strong> — ${escapeHtml(q.options[q.answer] || '')}</div>`;
    });

    scoreEl.innerText = `得分: ${correct} / ${(d.questions || []).length}`;
    reviewEl.classList.remove('hidden');
    submitBtn.classList.add('hidden');
    if (currentIdx >= 0 && currentIdx < questionList.length - 1) nextBtn.classList.remove('hidden');
    if (!scores[d.id] || correct > scores[d.id]) {
      scores[d.id] = correct;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
    }
  }

  function retry() {
    document.querySelectorAll('input[type="radio"]').forEach(inp => {
      inp.checked = false;
      inp.disabled = false;
    });
    document.querySelectorAll('.option').forEach(label => {
      label.classList.remove('correct', 'wrong', 'dim');
    });
    reviewEl.classList.add('hidden');
    scoreEl.innerText = '';
    submitBtn.classList.remove('hidden');
    nextBtn.classList.add('hidden');
    clearInterval(timer);
    startTime = Date.now();
    document.getElementById('timer').innerText = '⏱ 00:00';
    timer = setInterval(updateTimer, 1000);
    if (currentIdx >= 0 && currentIdx < questionList.length - 1) {
      nextBtn.onclick = () => {
        const nextId = questionList[currentIdx + 1].id;
        location.href = `practice.html?id=${nextId}`;
      };
    }
  }

  submitBtn.addEventListener('click', checkScore);
  retryBtn.addEventListener('click', retry);
</script>
</body>
</html>
